<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бриф для розробки сайту</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 40px 15px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }
        h1 {
            margin-top: 0;
            text-align: center;
        }
        p.description {
            text-align: center;
            color: #555;
            margin-bottom: 10px;
        }
        p.author {
            text-align: center;
            color: #777;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
        }
        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea {
            resize: vertical;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .checkbox-group input {
            width: auto;
        }
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
        }
        button:hover {
            background: #1d4ed8;
        }
        .errorlist {
            color: #c62828;
            margin: 6px 0 0 0;
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Бриф для розробки сайту</h1>
        <p class="description">
            Заповніть форму для збору вимог до майбутнього проєкту.
        </p>
        <p class="author">
            Роботу виконав: Руденко Олексій, ІПЗ-22-2
        </p>

        <form method="post">
            {% csrf_token %}

            {% for field in form %}
                <div class="form-group">
                    {% if field.name == "content_ready" %}
                        <div class="checkbox-group">
                            {{ field }}
                            <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                        </div>
                    {% else %}
                        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                        {{ field }}
                    {% endif %}
                    {{ field.errors }}
                </div>
            {% endfor %}

            <button type="submit">Надіслати</button>
        </form>
    </div>
</body>
</html>
